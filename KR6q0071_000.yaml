front:
  text: 如淨禪師語録序五家宗派中曹洞則機關不露臨濟則棒喝分明苟得其由門戶易入雖取捨少異作用弗同要之殊塗一致耳惟天童淨禪師不流不倚兼而有之自成一家八面受敵始以竹篦子久知痛癢後因一滴水漸至澎衝斷塹懸崖斬釘截鐵所謂用法得法外意得魚忘筌得兔忘蹄者也觀其登寶華座若猛虎踞擊大法鼓作獅子吼直使人天讚仰魔鬼歸降至於一偈一頌一話一言呼風吐雲轟雷掣電千態萬貌不可窮盡近世尊宿絶無僅有者凡歷四大寶剎孤雲野鶴去住自如皆於是見焉故勇猛精進者得之猶入暗室遇大光明見種種色退縮未諭者畏之如子弟之對嚴父師殊不知藥瞑眩而厥疾瘳終有益矣師之得力處出生入死處固難以形迹求作實法會然觀水必觀瀾涉大海從津涯故舍其言無以求其奧也宗上人以師之法語俾豫序其篇首豫則安能蓋豫與師為鄉國人為道誼友且心眼相照不可無數語以述大概因卒爾以附于帙尾若夫發揚盛美使燈燈相續師之名愈久而愈隆則有當世之名公巨儒在紹定二歲在己丑桐柏散吏呂瀟敬書如淨禪師語録目次上卷序清涼語録淨慈語録瑞岩語録再住淨慈語録下卷天童語録上堂小參普説法語頌古讚佛祖小佛事偈頌跋
